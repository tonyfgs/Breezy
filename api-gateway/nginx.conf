events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        location = /authenticate {
            internal;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_pass http://iam:4001/auth/validate;
        }

        # Routes publiques IAM
        location /auth/ {
            proxy_pass http://iam:4001/auth/;
        }

        # Routes privées - Users
        location /users/ {
            auth_request /authenticate;
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://users:4002/users/;
        }

        # Routes privées - Posts
        location /posts/ {
            auth_request /authenticate;
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://posts:4003/posts/;
        }

        # Routes privées - Moderation
        location /reports/ {
            auth_request /authenticate;
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://moderation:4005/reports/;
        }

        location /sanctions/ {
            auth_request /authenticate;
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://moderation:4005/sanctions/;
        }

        # Routes privées - Notifications (décommenter quand le service est disponible)
        # location /notifications/ {
        #     auth_request /authenticate;
        #     proxy_set_header Authorization $http_authorization;
        #     proxy_pass http://notifications:4004/notifications/;
        # }
    }
}

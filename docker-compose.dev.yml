services:
  front:
    build:
      context: ./front
      dockerfile: Dockerfile.dev
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "4000:80"
    depends_on:
      - iam

  iam:
    build:
      context: ./microservices/iam
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/iam:/app
      - /app/node_modules
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=development
      - DB_HOST=iam-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=iam_db
      - JWT_SECRET=secret
      - JWT_EXPIRES_IN=1h
    depends_on:
      - iam-db

  iam-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam_db
    volumes:
      - iam_data:/var/lib/postgresql/data

  users:
    build:
      context: ./microservices/users
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/users:/app
      - /app/node_modules
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - NODE_ENV=development

  posts:
    build:
      context: ./microservices/posts
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/posts:/app
      - /app/node_modules
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - NODE_ENV=development

  notifications:
    build:
      context: ./microservices/notifications
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/notifications:/app
      - /app/node_modules
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - NODE_ENV=development

volumes:
  iam_data:

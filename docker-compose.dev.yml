services:

#  front:
#    build:
#      context: ./front
#      dockerfile: Dockerfile.dev
#    volumes:
#      - ./front:/app
#      - /app/node_modules
#      - /app/.next
#    ports:
#      - "3000:3000"
#    environment:
#      - NEXT_PUBLIC_API_URL=http://localhost:4000

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.dev
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "4000:80"
    depends_on:
      - iam

  iam:
    build:
      context: ./microservices/iam
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/iam:/app
      - /app/node_modules
    ports:
      - "4001:4001"
    environment:
      - PORT=4001
      - NODE_ENV=development
      - DB_HOST=iam-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=iam_db
      - JWT_SECRET=secret
      - JWT_EXPIRES_IN=1h
      - SERVICE_SECRET=breezy-internal
      - USERS_SERVICE_URL=http://users:4002
    depends_on:
      - iam-db

  iam-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam_db
    volumes:
      - iam_data:/var/lib/postgresql/data

  users:
    build:
      context: ./microservices/users
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/users:/app
      - /app/node_modules
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - NODE_ENV=development
      - MONGODB_URI=mongodb://users-db:27017/breezy-users
      - JWT_SECRET=secret
      - SERVICE_SECRET=breezy-internal
    depends_on:
      - users-db

  users-db:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - users_data:/data/db

  posts:
    build:
      context: ./microservices/posts
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/posts:/app
      - /app/node_modules
    ports:
      - "4003:4003"
    environment:
      - PORT=4003
      - NODE_ENV=development
      - MONGODB_URI=mongodb://posts-db:27017/breezy-posts
      - JWT_SECRET=secret
    depends_on:
      - posts-db

  posts-db:
    image: mongo:7
    command: mongod --quiet --setParameter logLevel=0
    ports:
      - "27019:27017"
    volumes:
      - posts_data:/data/db

  feed:
    build:
      context: ./microservices/feed
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/feed:/app
      - /app/node_modules
    ports:
      - "4004:4004"
    environment:
      - PORT=4004
      - NODE_ENV=development
      - BASE_URL_POSTS=http://posts:4003
      - BASE_URL_USERS=http://users:4002
      - BASE_URL_MODERATION=http://moderation:4005
      - JWT_SECRET=secret
    depends_on:
      - posts
      - users
      - moderation

  moderation:
    build:
      context: ./microservices/moderation
      dockerfile: Dockerfile.dev
    volumes:
      - ./microservices/moderation:/app
      - /app/node_modules
    ports:
      - "4005:4005"
    environment:
      - PORT=4005
      - NODE_ENV=development
      - MONGODB_URI=mongodb://moderation-db:27017/breezy-moderation
      - USERS_SERVICE_URL=http://users:4002
      - POSTS_SERVICE_URL=http://posts:4003
      - JWT_SECRET=secret
    depends_on:
      - moderation-db
      - users
      - posts

  moderation-db:
    image: mongo:7
    command: mongod --quiet --setParameter logLevel=0
    ports:
      - "27020:27017"
    volumes:
      - moderation_data:/data/db

volumes:
  iam_data:
  posts_data:
  users_data:
  moderation_data:
